<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azure SQL CRUD</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #f4f4f9;
    margin: 0;
    padding: 20px;
    color: #333;
  }

  h1 {
    text-align: center;
    color: #2c3e50;
  }

  /* Form styling */
  #itemForm {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
    gap: 10px;
    flex-wrap: wrap;
  }

  #itemForm input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    width: 200px;
    font-size: 16px;
  }

  #itemForm button {
    padding: 10px 20px;
    border: none;
    background-color: #3498db;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
  }

  #itemForm button:hover {
    background-color: #2980b9;
  }

  /* Table styling */
  table {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    border-collapse: collapse;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    background-color: #fff;
  }

  th, td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }

  th {
    background-color: #2c3e50;
    color: white;
  }

  tr:hover {
    background-color: #f1f1f1;
  }

  /* Buttons in table */
  button {
    padding: 6px 12px;
    margin-right: 5px;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:nth-child(1) {
    background-color: #e74c3c;
    color: white;
  }

  button:nth-child(1):hover {
    background-color: #c0392b;
  }

  button:nth-child(2) {
    background-color: #27ae60;
    color: white;
  }

  button:nth-child(2):hover {
    background-color: #1e8449;
  }

  /* Responsive adjustments */
  @media (max-width: 600px) {
    #itemForm {
      flex-direction: column;
      align-items: center;
    }

    #itemForm input {
      width: 80%;
    }
  }
</style>
</head>
<body>
<h1>Items CRUD with Azure SQL</h1>

<form id="itemForm">
    <input type="text" id="name" placeholder="Name" required />
    <input type="text" id="description" placeholder="Description" required />
    <button type="submit">Add Item</button>
</form>

<h2 style="text-align:center;">Items List</h2>
<table id="itemsTable">
    <thead>
        <tr>
            <th>ID</th><th>Name</th><th>Description</th><th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const apiUrl = '/api/items';

async function fetchItems() {
    const res = await fetch(apiUrl);
    const items = await res.json();
    const tbody = document.querySelector('#itemsTable tbody');
    tbody.innerHTML = '';
    items.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.description}</td>
            <td>
                <button onclick="editItem(${item.id}, this)">Edit</button>
                <button onclick="deleteItem(${item.id})">Delete</button>
            </td>
        `;
        tbody.appendChild(row);
    });
}

document.getElementById('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const description = document.getElementById('description').value;
    await fetch(apiUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, description})
    });
    document.getElementById('itemForm').reset();
    fetchItems();
});

async function deleteItem(id) {
    await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
    fetchItems();
}

function editItem(id, btn) {
    const row = btn.closest('tr');

    const name = row.children[1].innerText;
    const description = row.children[2].innerText;

    const newName = prompt('New name:', name);
    const newDescription = prompt('New description:', description);

    if (newName && newDescription) {
        fetch(`${apiUrl}/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: newName, description: newDescription})
        }).then(() => fetchItems());
    }
}

// Load items on page load
fetchItems();
</script>
</body>
</html>
